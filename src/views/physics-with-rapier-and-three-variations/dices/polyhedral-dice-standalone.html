<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Polyhedral Dice — 3D</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #05060a; overflow: hidden; }
  #stage {
    position: relative; width: 100vw; height: 100vh; overflow: hidden;
    background: radial-gradient(125% 125% at 50% 30%, #1c202b 0%, #0b0d13 56%, #05060a 100%);
    font-family: 'Space Grotesk', system-ui, sans-serif; user-select: none; -webkit-user-select: none;
  }
  #c { display: block; width: 100%; height: 100%; touch-action: none; cursor: grab; }
  .tl { position: absolute; top: 32px; left: 38px; pointer-events: none; }
  .tl .kicker { font-size: 13px; letter-spacing: 0.42em; text-transform: uppercase; color: #7d8699; font-weight: 600; }
  .tl .title { font-size: 44px; font-weight: 700; color: #eef1f8; line-height: 1; margin-top: 6px; letter-spacing: -0.02em; }
  #bar { position: absolute; top: 34px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; padding: 7px;
    border-radius: 100px; background: rgba(20,23,32,0.6); border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(14px); }
  #bar button { padding: 9px 15px; border-radius: 100px; border: none; background: transparent; color: #9aa3b5;
    font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; transition: background .12s, color .12s; }
  .bottom { position: absolute; bottom: 34px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 20px; }
  .result { display: flex; align-items: center; gap: 12px; padding: 11px 16px 11px 20px; border-radius: 100px;
    background: rgba(20,23,32,0.66); border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(14px); }
  .result .lbl { font-size: 14px; color: #9aa3b5; font-weight: 500; }
  .result .val { font-size: 26px; font-weight: 700; color: #eef1f8; min-width: 40px; text-align: center; line-height: 1; }
  #roll { padding: 14px 30px; border-radius: 100px; border: none; background: #eef1f8; color: #0b0d13;
    font-family: inherit; font-size: 15px; font-weight: 600; cursor: pointer; transition: transform .12s, background .12s; }
  #roll:hover { background: #fff; transform: translateY(-1px); }
  .hint { position: absolute; bottom: 38px; right: 38px; font-size: 13px; color: #6b7488; text-align: right; line-height: 1.7; pointer-events: none; }
</style>
</head>
<body>
<div id="stage">
  <canvas id="c"></canvas>
  <div class="tl"><div class="kicker">Polyhedral Set</div><div class="title">Roll the Dice</div></div>
  <div id="bar">
    <button data-type="d4">D4</button>
    <button data-type="d6">D6</button>
    <button data-type="d8">D8</button>
    <button data-type="d10">D10</button>
    <button data-type="d12">D12</button>
    <button data-type="d20">D20</button>
  </div>
  <div class="bottom">
    <div class="result"><span class="lbl">Result</span><span class="val" id="res">–</span></div>
    <button id="roll">Roll</button>
  </div>
  <div class="hint">drag to rotate<br>click the die to roll</div>
</div>

<script type="module">
import * as THREE from 'three';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

// ---- config (edit these) ----
const DIE_COLOR = '#2b47c9';
const NUMBER_COLOR = '#f4f6ff';
const AUTO_SPIN = true;
const START_TYPE = 'd8';
// finish: 'glossy' | 'metallic' | 'glass'
const FINISH = 'glossy';

const canvas = document.getElementById('c');
const stage = document.getElementById('stage');
const resEl = document.getElementById('res');
const bar = document.getElementById('bar');

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.12;
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(38, 1, 0.1, 100);
camera.position.set(0, 0.5, 4.6);
camera.lookAt(0, 0, 0);

const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

scene.add(new THREE.AmbientLight(0xffffff, 0.18));
const key = new THREE.DirectionalLight(0xffffff, 2.3);
key.position.set(3.5, 6.5, 4.5);
key.castShadow = true;
key.shadow.mapSize.set(1024, 1024);
key.shadow.camera.near = 1; key.shadow.camera.far = 24;
key.shadow.camera.left = -3.5; key.shadow.camera.right = 3.5; key.shadow.camera.top = 3.5; key.shadow.camera.bottom = -3.5;
key.shadow.bias = -0.0004; key.shadow.radius = 6;
scene.add(key);
const fill = new THREE.DirectionalLight(0x9fb4ff, 0.6); fill.position.set(-4, 1, -2); scene.add(fill);
const rim = new THREE.DirectionalLight(0xffffff, 0.9); rim.position.set(-1, 3, -5); scene.add(rim);

const ground = new THREE.Mesh(new THREE.PlaneGeometry(40, 40), new THREE.ShadowMaterial({ opacity: 0.42 }));
ground.rotation.x = -Math.PI / 2; ground.position.y = -1.5; ground.receiveShadow = true;
scene.add(ground);

// ---- dice definitions ----
const CONFIG = {
  d4:  { make: () => new THREE.TetrahedronGeometry(1), sum: null, base: 1 },
  d6:  { make: () => new THREE.BoxGeometry(1.25, 1.25, 1.25), sum: 7, base: 1 },
  d8:  { make: () => new THREE.OctahedronGeometry(1), sum: 9, base: 1 },
  d10: { sum: 9, base: 0 },
  d12: { make: () => new THREE.DodecahedronGeometry(1), sum: 13, base: 1 },
  d20: { make: () => new THREE.IcosahedronGeometry(1), sum: 21, base: 1 },
};

function material() {
  if (FINISH === 'metallic') return new THREE.MeshPhysicalMaterial({ color: DIE_COLOR, metalness: 1, roughness: 0.26, clearcoat: 0.5, clearcoatRoughness: 0.2, envMapIntensity: 1.3, flatShading: true });
  if (FINISH === 'glass') return new THREE.MeshPhysicalMaterial({ color: DIE_COLOR, metalness: 0, roughness: 0.05, transmission: 0.92, thickness: 1.4, ior: 1.5, clearcoat: 1, clearcoatRoughness: 0.06, envMapIntensity: 1.4, transparent: true, flatShading: true });
  return new THREE.MeshPhysicalMaterial({ color: DIE_COLOR, metalness: 0, roughness: 0.32, clearcoat: 1, clearcoatRoughness: 0.12, flatShading: true });
}

function numberTexture(n) {
  const cv = document.createElement('canvas'); cv.width = cv.height = 256;
  const ctx = cv.getContext('2d'); ctx.fillStyle = '#ffffff';
  const s = String(n); const two = s.length > 1;
  ctx.font = 'bold ' + (two ? 112 : 155) + 'px Helvetica, Arial, sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(s, 128, two ? 132 : 140);
  if (n === 6 || n === 9) ctx.fillRect(80, 202, 96, 12);
  const tex = new THREE.CanvasTexture(cv);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
  return tex;
}

function makeD10() {
  const R = 0.62, h = 0.17, H = 0.63;
  const U = [], L = [];
  for (let i = 0; i < 5; i++) { const a = i * 72 * Math.PI / 180; U.push(new THREE.Vector3(R * Math.cos(a), h, R * Math.sin(a))); }
  for (let i = 0; i < 5; i++) { const a = (i * 72 + 36) * Math.PI / 180; L.push(new THREE.Vector3(R * Math.cos(a), -h, R * Math.sin(a))); }
  const TOP = new THREE.Vector3(0, H, 0), BOT = new THREE.Vector3(0, -H, 0);
  const kites = [];
  for (let i = 0; i < 5; i++) kites.push([TOP, U[i], L[i], U[(i + 1) % 5]]);
  for (let i = 0; i < 5; i++) kites.push([BOT, L[i], U[(i + 1) % 5], L[(i + 1) % 5]]);
  const pos = [], faces = [];
  for (const k of kites) {
    const c = new THREE.Vector3().add(k[0]).add(k[1]).add(k[2]).add(k[3]).multiplyScalar(0.25);
    const outward = c.clone().normalize();
    for (const t of [[0, 1, 2], [0, 2, 3]]) {
      let a = k[t[0]], b = k[t[1]], cc = k[t[2]];
      const nrm = new THREE.Vector3().subVectors(b, a).cross(new THREE.Vector3().subVectors(cc, a));
      if (nrm.dot(outward) < 0) { const tmp = b; b = cc; cc = tmp; }
      pos.push(a.x, a.y, a.z, b.x, b.y, b.z, cc.x, cc.y, cc.z);
    }
    faces.push({ center: c, normal: outward, circumR: Math.max(...k.map(v => v.distanceTo(c))), verts: 4 });
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  g.computeVertexNormals(); g.computeBoundingSphere();
  const s = 1.2 / g.boundingSphere.radius; g.scale(s, s, s);
  faces.forEach(f => { f.center.multiplyScalar(s); f.circumR *= s; });
  return { geometry: g, faces };
}

function groupFaces(geo) {
  const p = geo.attributes.position;
  const map = new Map();
  const va = new THREE.Vector3(), vb = new THREE.Vector3(), vc = new THREE.Vector3();
  for (let i = 0; i < p.count; i += 3) {
    va.fromBufferAttribute(p, i); vb.fromBufferAttribute(p, i + 1); vc.fromBufferAttribute(p, i + 2);
    const n = new THREE.Vector3().subVectors(vb, va).cross(new THREE.Vector3().subVectors(vc, va)).normalize();
    const kk = n.x.toFixed(2) + ',' + n.y.toFixed(2) + ',' + n.z.toFixed(2);
    let e = map.get(kk);
    if (!e) { e = { normal: n.clone(), verts: new Map() }; map.set(kk, e); }
    [va, vb, vc].forEach(v => { const vk = v.x.toFixed(3) + ',' + v.y.toFixed(3) + ',' + v.z.toFixed(3); if (!e.verts.has(vk)) e.verts.set(vk, v.clone()); });
  }
  const faces = [];
  for (const e of map.values()) {
    const vs = [...e.verts.values()];
    const c = new THREE.Vector3(); vs.forEach(v => c.add(v)); c.multiplyScalar(1 / vs.length);
    faces.push({ center: c, normal: e.normal, circumR: Math.max(...vs.map(v => v.distanceTo(c))), verts: vs.length });
  }
  return faces;
}

function assignNumbers(faces, cfg) {
  const nums = new Array(faces.length);
  if (cfg.sum == null) { faces.forEach((f, i) => nums[i] = cfg.base + i); return nums; }
  const used = new Array(faces.length).fill(false);
  let v = cfg.base;
  for (let i = 0; i < faces.length; i++) {
    if (used[i]) continue;
    let best = -1, bestDot = Infinity;
    for (let j = 0; j < faces.length; j++) { if (j === i || used[j]) continue; const d = faces[i].normal.dot(faces[j].normal); if (d < bestDot) { bestDot = d; best = j; } }
    used[i] = true; nums[i] = v;
    if (best >= 0) { used[best] = true; nums[best] = cfg.sum - v; }
    v++;
  }
  return nums;
}

let die = null, faceData = [], currentType = START_TYPE, body = null;

function buildDie(type) {
  if (die) {
    scene.remove(die);
    die.traverse(o => { if (o.geometry) o.geometry.dispose(); if (o.material) { if (o.material.map) o.material.map.dispose(); o.material.dispose(); } });
  }
  const cfg = CONFIG[type];
  let geo, faces;
  if (type === 'd10') { const d = makeD10(); geo = d.geometry; faces = d.faces; }
  else {
    geo = cfg.make();
    if (geo.index) geo = geo.toNonIndexed();
    geo.computeBoundingSphere();
    const s = 1.2 / geo.boundingSphere.radius; geo.scale(s, s, s);
    faces = groupFaces(geo);
  }
  die = new THREE.Group();
  body = new THREE.Mesh(geo, material());
  body.castShadow = true;
  die.add(body);
  const numbers = assignNumbers(faces, cfg);
  faces.forEach((f, i) => {
    const mat = new THREE.MeshBasicMaterial({ map: numberTexture(numbers[i]), transparent: true, color: NUMBER_COLOR, depthWrite: false, side: THREE.DoubleSide });
    const inR = f.circumR * Math.cos(Math.PI / f.verts);
    const plane = new THREE.Mesh(new THREE.PlaneGeometry(inR * 1.32, inR * 1.32), mat);
    plane.position.copy(f.center).addScaledVector(f.normal, 0.01);
    const q = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0, 0, 1), f.normal);
    const up = new THREE.Vector3(0, 1, 0).applyQuaternion(q);
    let desired = new THREE.Vector3(0, 1, 0).addScaledVector(f.normal, -f.normal.dot(new THREE.Vector3(0, 1, 0)));
    if (desired.lengthSq() < 1e-6) desired = new THREE.Vector3(1, 0, 0).addScaledVector(f.normal, -f.normal.dot(new THREE.Vector3(1, 0, 0)));
    desired.normalize();
    const ang = Math.atan2(up.clone().cross(desired).dot(f.normal), up.dot(desired));
    q.premultiply(new THREE.Quaternion().setFromAxisAngle(f.normal, ang));
    plane.quaternion.copy(q);
    plane.renderOrder = 2;
    die.add(plane);
  });
  faceData = faces.map((f, i) => ({ number: numbers[i], normal: f.normal.clone() }));
  currentType = type;
  scene.add(die);
}

function updateActive() {
  bar.querySelectorAll('button[data-type]').forEach(b => {
    const on = b.dataset.type === currentType;
    b.style.background = on ? '#eef1f8' : 'transparent';
    b.style.color = on ? '#0b0d13' : '#9aa3b5';
  });
}

function setType(type) {
  if (type === currentType) return;
  buildDie(type); velX = 0; velY = 0; rolling = false;
  resEl.textContent = '–'; updateActive();
}

// ---- interaction ----
const autoAxis = new THREE.Vector3(0.28, 1, 0.16).normalize();
const wX = new THREE.Vector3(1, 0, 0), wY = new THREE.Vector3(0, 1, 0);
let velX = 0, velY = 0, dragging = false, rolling = false, moved = false;
let lastX = 0, lastY = 0, rollT = 0, rollNum = 0, startQ, targetQ, wobbleAxis;

canvas.addEventListener('pointerdown', e => { dragging = true; moved = false; lastX = e.clientX; lastY = e.clientY; canvas.setPointerCapture(e.pointerId); canvas.style.cursor = 'grabbing'; });
canvas.addEventListener('pointermove', e => {
  if (!dragging || rolling) return;
  const dx = e.clientX - lastX, dy = e.clientY - lastY; lastX = e.clientX; lastY = e.clientY;
  if (Math.abs(dx) + Math.abs(dy) > 3) moved = true;
  die.rotateOnWorldAxis(wY, dx * 0.008); die.rotateOnWorldAxis(wX, dy * 0.008);
  velX = dx * 0.008; velY = dy * 0.008;
});
function end() { if (!dragging) return; dragging = false; canvas.style.cursor = 'grab'; if (!moved && !rolling) roll(); }
canvas.addEventListener('pointerup', end);
canvas.addEventListener('pointercancel', end);
bar.addEventListener('click', e => { const b = e.target.closest('button[data-type]'); if (b) setType(b.dataset.type); });
document.getElementById('roll').addEventListener('click', roll);

function roll() {
  if (rolling || !faceData.length) return;
  const face = faceData[Math.floor(Math.random() * faceData.length)];
  rollNum = face.number;
  const q = new THREE.Quaternion().setFromUnitVectors(face.normal, new THREE.Vector3(0, 1, 0));
  const yaw = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), Math.random() * Math.PI * 2);
  startQ = die.quaternion.clone(); targetQ = yaw.multiply(q);
  wobbleAxis = new THREE.Vector3(Math.random() - 0.5, Math.random() - 0.5, Math.random() - 0.5).normalize();
  velX = 0; velY = 0; rollT = 0; rolling = true; resEl.textContent = '–';
}

function resize() { const w = stage.clientWidth, h = stage.clientHeight; renderer.setSize(w, h, false); camera.aspect = w / h; camera.updateProjectionMatrix(); }
resize();
new ResizeObserver(resize).observe(stage);

buildDie(currentType); updateActive();

const clock = new THREE.Clock();
(function loop() {
  requestAnimationFrame(loop);
  const dt = Math.min(clock.getDelta(), 0.05);
  if (rolling) {
    rollT += dt / 1.35;
    const t = Math.min(1, rollT);
    const e = 1 - Math.pow(1 - t, 3);
    const q = startQ.clone().slerp(targetQ, e);
    const amp = (1 - t) * (1 - t);
    const wob = new THREE.Quaternion().setFromAxisAngle(wobbleAxis, Math.sin(t * Math.PI * 4) * amp);
    die.quaternion.copy(wob.multiply(q));
    if (t >= 1) { rolling = false; die.quaternion.copy(targetQ); resEl.textContent = (currentType === 'd10' && rollNum === 0) ? 10 : rollNum; }
  } else if (!dragging) {
    if (AUTO_SPIN) die.rotateOnWorldAxis(autoAxis, 0.0038);
    if (Math.abs(velX) > 0.0002) { die.rotateOnWorldAxis(wY, velX); velX *= 0.93; }
    if (Math.abs(velY) > 0.0002) { die.rotateOnWorldAxis(wX, velY); velY *= 0.93; }
  }
  renderer.render(scene, camera);
})();
</script>
</body>
</html>
